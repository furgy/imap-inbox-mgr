name: CI

on:
  push:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          current_version=$(cat VERSION)
          previous_version=$(git show HEAD^:VERSION 2>/dev/null || echo "0.0.0")
          
          echo "Current version: $current_version"
          echo "Previous version: $previous_version"
          
          if [ "$current_version" = "$previous_version" ]; then
            echo "ERROR: Version not bumped! Current: $current_version, Previous: $previous_version"
            exit 1
          fi
          
          echo "Version bump verified: $previous_version -> $current_version"
